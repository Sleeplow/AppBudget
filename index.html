<!DOCTYPE html>
<html lang="fr" data-app="budget">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleeplow — Applications</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="lang-switch" role="group" aria-label="Langue / Language">
    <button class="active" onclick="setLang('fr')">FR</button>
    <button onclick="setLang('en')">EN</button>
  </div>
  <span class="logo-icon" id="app-logo" role="img" aria-label="Budget"></span>
  <h1 id="app-name">Budget</h1>
  <p id="app-tagline">par Sleeplow</p>
</header>

<!-- Carousel: one slide per app. Header, theme color and cards are rendered
     from the APPS registry in script.js. -->
<div class="carousel">
  <button class="carousel-arrow prev" type="button" aria-label="Application précédente / Previous app">‹</button>
  <button class="carousel-arrow next" type="button" aria-label="Application suivante / Next app">›</button>

  <div class="carousel-viewport">
    <div class="carousel-track" id="carousel-track"></div>
  </div>

  <div class="carousel-dots" id="carousel-dots"></div>
</div>

<script src="script.js"></script>
</body>
</html>
